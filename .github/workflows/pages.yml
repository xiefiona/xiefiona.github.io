name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "21 6 * * 1" # Weekly, Mon 06:21 UTC, refresh publications
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Import publications from Semantic Scholar (best-effort)
        # Prefer repo variable; else fall back to data file `_data/semanticscholar.yml`
        env:
          S2_AUTHOR_ID: ${{ vars.S2_AUTHOR_ID }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          python -m pip install --upgrade pip >/dev/null 2>&1 || true
          python -m pip install requests pyyaml >/dev/null 2>&1 || true
          if [ -z "${S2_AUTHOR_ID}" ] && [ -f _data/semanticscholar.yml ]; then
            export S2_AUTHOR_ID=$(python - <<'PY'
import yaml,sys
print(yaml.safe_load(open('_data/semanticscholar.yml'))['id'])
PY
)
          fi
          if [ -n "${S2_AUTHOR_ID}" ]; then
            python scripts/import_publications.py || echo "Importer warning (continuing build)"
          else
            echo "No S2_AUTHOR_ID provided; skipping import"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
